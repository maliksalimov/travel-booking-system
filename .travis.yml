language: java
jdk:
  - openjdk11

services:
  - docker

before_install:
  - chmod +x gradlew

install:
  - ./gradlew clean build -x test

script:
  - ./gradlew test jacocoTestReport
  - docker-compose build

after_success:
  - bash <(curl -s https://codecov.io/bash)

cache:
  directories:
    - $HOME/.gradle/caches/
    - $HOME/.gradle/wrapper/