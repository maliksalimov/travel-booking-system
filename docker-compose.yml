version: '3.8'

services:
  discovery-service:
    build: ./discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    networks:
      - travel-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761"]
      interval: 30s
      timeout: 10s
      retries: 5

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      discovery-service:
        condition: service_healthy
    networks:
      - travel-network
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/

  flight-service:
    build: ./flight-service
    container_name: flight-service
    ports:
      - "8081:8081"
    depends_on:
      discovery-service:
        condition: service_healthy
    networks:
      - travel-network
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - RAPIDAPI_KEY=${RAPIDAPI_KEY}

  hotel-service:
    build: ./hotel-service
    container_name: hotel-service
    ports:
      - "8082:8082"
    depends_on:
      discovery-service:
        condition: service_healthy
    networks:
      - travel-network
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/

  car-rental-service:
    build: ./car-rental-service
    container_name: car-rental-service
    ports:
      - "8083:8083"
    depends_on:
      discovery-service:
        condition: service_healthy
    networks:
      - travel-network
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/

networks:
  travel-network:
    driver: bridge