server:
  port: 8080

spring:
  application:
    name: api-gateway

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

zuul:
  routes:
    flights:
      path: /flights/**
      serviceId: FLIGHT-SERVICE
      strip-prefix: false
    hotels:
      path: /hotels/**
      serviceId: HOTEL-SERVICE
      strip-prefix: false
    cars:
      path: /cars/**
      serviceId: CAR-RENTAL-SERVICE
      strip-prefix: false
  host:
    connect-timeout-millis: 5000
    socket-timeout-millis: 30000

ribbon:
  eureka:
    enabled: true
  ConnectTimeout: 5000
  ReadTimeout: 20000

hystrix:
  command:
    default:
      execution:
        isolation:
          thread:
            timeoutInMilliseconds: 30000
